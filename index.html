<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5by5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --border: #d4d4d0;
    --border-hover: #999;
    --text: #1a1a1a;
    --text-dim: #888;
    --accent: #ff3e00;
    --cell-size: 64px;
    --grid-gap: 0px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Pixel noise background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='%23000000' fill-opacity='0.02'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 32px 40px 0;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  h1 {
    font-family: 'Silkscreen', cursive;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  h1 span {
    color: var(--accent);
  }

  header .tagline {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 48px;
    padding: 40px;
    width: 100%;
    max-width: 960px;
  }

  /* ---- GRID EDITOR ---- */
  .editor {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .grid-wrapper {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
  }

  /* Row/col labels */
  .grid-labels-top {
    display: grid;
    grid-template-columns: repeat(5, var(--cell-size));
    gap: var(--grid-gap);
    margin-bottom: 6px;
    padding-left: 0;
  }

  .grid-labels-top span {
    text-align: center;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    font-family: 'DM Mono', monospace;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, var(--cell-size));
    grid-template-rows: repeat(5, var(--cell-size));
    gap: var(--grid-gap);
    cursor: crosshair;
  }

  .cell {
    position: relative;
    background: transparent;
    border: 1px solid transparent;
    transition: border-color 0.1s;
  }

  .cell:hover {
    border-color: rgba(255, 62, 0, 0.35);
    z-index: 2;
  }

  .cell .inner {
    position: absolute;
    inset: 0;
    transition: background 0.1s, opacity 0.1s;
  }

  .cell.solid .inner {
    opacity: 1;
  }

  .cell.half .inner {
    opacity: 0.5;
  }

  /* Crosshair guides on hover */
  .grid-wrapper .coords {
    position: absolute;
    bottom: 4px;
    right: 8px;
    font-size: 9px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .grid-wrapper:hover .coords {
    opacity: 1;
  }

  /* ---- SIDEBAR ---- */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-width: 240px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
  }

  .panel-title {
    font-family: 'Silkscreen', cursive;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Preview */
  .previews {
    display: flex;
    align-items: flex-end;
    gap: 20px;
  }

  .preview-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .preview-box label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .preview-frame {
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    image-rendering: pixelated;
  }

  .preview-frame.actual {
    width: 40px;
    height: 40px;
  }

  .preview-frame.scaled {
    width: 100px;
    height: 100px;
  }

  .preview-frame canvas {
    image-rendering: pixelated;
  }

  /* Color controls */
  .color-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .color-row:last-child {
    margin-bottom: 0;
  }

  .color-label {
    font-size: 11px;
    color: var(--text-dim);
    width: 28px;
    flex-shrink: 0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .color-input-wrap {
    position: relative;
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
    cursor: pointer;
  }

  .color-input-wrap:hover {
    border-color: var(--border-hover);
  }

  .color-input-wrap input[type="color"] {
    position: absolute;
    inset: -8px;
    width: calc(100% + 16px);
    height: calc(100% + 16px);
    border: none;
    cursor: pointer;
    background: none;
    padding: 0;
  }

  .color-input-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .color-input-wrap input[type="color"]::-webkit-color-swatch { border: none; }

  .color-hex {
    font-size: 11px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    background: none;
    border: 1px solid var(--border);
    padding: 4px 8px;
    width: 80px;
    outline: none;
    transition: border-color 0.15s;
  }

  .color-hex:focus {
    border-color: var(--accent);
  }

  /* Export */
  .filename-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .filename-input {
    flex: 1;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    letter-spacing: 0.5px;
    transition: border-color 0.15s;
  }

  .filename-input:focus {
    border-color: var(--accent);
  }

  .filename-ext {
    color: var(--text-dim);
    font-size: 12px;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    font-family: 'Silkscreen', cursive;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.12s;
    width: 100%;
  }

  .btn:hover {
    border-color: var(--text);
    background: var(--text);
    color: var(--surface);
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn.primary:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn-row .btn {
    flex: 1;
  }

  /* State indicator */
  .state-legend {
    display: flex;
    gap: 16px;
    margin-top: 4px;
  }

  .state-legend .state {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .state-legend .swatch {
    width: 12px;
    height: 12px;
    border: 1px solid var(--border);
  }

  .state-legend .swatch.s-empty { background: transparent; }
  .state-legend .swatch.s-solid { background: #000; }
  .state-legend .swatch.s-half { background: rgba(0,0,0,0.5); }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--surface);
    font-family: 'Silkscreen', cursive;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 10px 20px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Responsive */
  @media (max-width: 720px) {
    main {
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 24px 16px;
    }
    header { padding: 20px 16px 0; }
    :root { --cell-size: 56px; }
    .sidebar { min-width: unset; width: 100%; max-width: 360px; }
  }
</style>
</head>
<body>

<header>
  <h1>5<span>x</span>5</h1>
  <span class="tagline">pixel icon designer</span>
</header>

<main>
  <div class="editor">
    <div class="grid-wrapper">
      <div class="grid-labels-top">
        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
      </div>
      <div class="grid" id="grid"></div>
      <div class="coords" id="coords">—</div>
    </div>
    <div class="state-legend" id="legend">
      <div class="state"><div class="swatch s-empty"></div> empty</div>
      <div class="state"><div class="swatch s-solid"></div> solid</div>
      <div class="state"><div class="swatch s-half"></div> half</div>
    </div>
  </div>

  <div class="sidebar">
    <!-- Preview -->
    <div class="panel">
      <div class="panel-title">Preview</div>
      <div class="previews">
        <div class="preview-box">
          <div class="preview-frame actual" id="preview-actual-frame">
            <canvas id="preview-actual" width="5" height="5"></canvas>
          </div>
          <label>5 &times; 5</label>
        </div>
        <div class="preview-box">
          <div class="preview-frame scaled" id="preview-scaled-frame">
            <canvas id="preview-scaled" width="100" height="100"></canvas>
          </div>
          <label>100 &times; 100</label>
        </div>
      </div>
    </div>

    <!-- Colors -->
    <div class="panel">
      <div class="panel-title">Color</div>
      <div class="color-row">
        <span class="color-label">FG</span>
        <div class="color-input-wrap">
          <input type="color" id="color-fg" value="#000000">
        </div>
        <input type="text" class="color-hex" id="color-fg-hex" value="#000000" maxlength="7" spellcheck="false">
      </div>
      <div class="color-row">
        <span class="color-label">BG</span>
        <div class="color-input-wrap">
          <input type="color" id="color-bg" value="#ffffff">
        </div>
        <input type="text" class="color-hex" id="color-bg-hex" value="#ffffff" maxlength="7" spellcheck="false">
      </div>
    </div>

    <!-- Export -->
    <div class="panel">
      <div class="panel-title">Export</div>
      <div class="filename-row">
        <input type="text" class="filename-input" id="filename" value="icon" spellcheck="false" placeholder="filename">
        <span class="filename-ext">.svg</span>
      </div>
      <button class="btn primary" id="btn-export">Export SVG</button>
    </div>

    <!-- Actions -->
    <div class="panel">
      <div class="panel-title">Actions</div>
      <div class="btn-row">
        <button class="btn" id="btn-clear">Clear</button>
        <button class="btn" id="btn-reset-colors">Reset Colors</button>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // --- Base64url encoding (shared by all modes) ---
  const SIZE = 5;
  const B64 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';

  function decodeGrid(code) {
    const grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    if (code.length !== 7) return grid;
    let n = 0;
    for (let i = 0; i < 7; i++) {
      const idx = B64.indexOf(code[i]);
      if (idx === -1) return grid;
      n = n * 64 + idx;
    }
    for (let i = 24; i >= 0; i--) {
      grid[Math.floor(i / SIZE)][i % SIZE] = n % 3;
      n = Math.floor(n / 3);
    }
    return grid;
  }

  function encodeGridData(grid) {
    let n = 0;
    for (let i = 0; i < 25; i++)
      n = n * 3 + grid[Math.floor(i / SIZE)][i % SIZE];
    let s = '';
    for (let i = 0; i < 7; i++) {
      s = B64[n % 64] + s;
      n = Math.floor(n / 64);
    }
    return s;
  }

  function generateSVGFromGrid(grid, fg, bg) {
    const id = 'clip0_5by5';
    let rects = '';
    if (bg.toLowerCase() !== '#ffffff')
      rects += `<rect width="5" height="5" fill="${bg}"/>\n`;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (grid[y][x] === 1)
          rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${fg}"/>\n`;
        else if (grid[y][x] === 2)
          rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${fg}" fill-opacity="0.5"/>\n`;
      }
    }
    return `<svg width="5" height="5" viewBox="0 0 5 5" fill="none" xmlns="http://www.w3.org/2000/svg">\n<g clip-path="url(#${id})">\n${rects}</g>\n<defs>\n<clipPath id="${id}">\n<rect width="5" height="5" fill="white"/>\n</clipPath>\n</defs>\n</svg>`;
  }

  // --- Route: detect base path and parse grid code ---
  function isValidGridCode(s) {
    if (s.length !== 7) return false;
    for (let i = 0; i < 7; i++) if (B64.indexOf(s[i]) === -1) return false;
    return true;
  }

  function getBasePath() {
    const p = location.pathname.replace(/\/$/, '');
    const lastSeg = p.split('/').pop() || '';
    const candidate = lastSeg.replace(/\.svg$/, '').split(',')[0];
    if (isValidGridCode(candidate)) {
      return p.slice(0, p.lastIndexOf('/'));
    }
    return p;
  }

  const BASE = getBasePath();

  function parsePath() {
    const raw = location.pathname.slice(BASE.length).replace(/^\//, '').replace(/\/$/, '');
    const isSvg = raw.endsWith('.svg');
    const clean = raw.replace(/\.svg$/, '');
    const parts = clean.split(',');
    const code = parts[0] || '';
    const fg = parts[1] ? '#' + parts[1] : '#000000';
    const bg = parts[2] ? '#' + parts[2] : '#ffffff';
    return { code, fg, bg, isSvg };
  }

  // --- SVG-only mode: replace page with raw SVG ---
  const route = parsePath();
  if (route.isSvg && route.code.length === 7) {
    const grid = decodeGrid(route.code);
    const svg = generateSVGFromGrid(grid, route.fg, route.bg);
    document.open();
    document.write(svg);
    document.close();
  } else {
    // --- Editor mode ---
    const grid = route.code.length === 7 ? decodeGrid(route.code) : Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    const defaults = { fg: '#000000', bg: '#ffffff' };

    const gridEl = document.getElementById('grid');
    const coordsEl = document.getElementById('coords');
    const previewActual = document.getElementById('preview-actual');
    const previewScaled = document.getElementById('preview-scaled');
    const previewActualFrame = document.getElementById('preview-actual-frame');
    const previewScaledFrame = document.getElementById('preview-scaled-frame');
    const colorFg = document.getElementById('color-fg');
    const colorBg = document.getElementById('color-bg');
    const colorFgHex = document.getElementById('color-fg-hex');
    const colorBgHex = document.getElementById('color-bg-hex');
    const filenameInput = document.getElementById('filename');
    const toastEl = document.getElementById('toast');

    // Load colors from path
    if (route.code.length === 7) {
      colorFg.value = route.fg;
      colorFgHex.value = route.fg;
      colorBg.value = route.bg;
      colorBgHex.value = route.bg;
    }

    // --- Central onChange ---
    function onChange() {
      const fg = colorFg.value;
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const cell = cells[y * SIZE + x];
          const inner = cell.querySelector('.inner');
          const state = grid[y][x];
          cell.className = 'cell' + (state === 1 ? ' solid' : state === 2 ? ' half' : '');
          if (state === 0) {
            inner.style.background = 'transparent';
            inner.style.opacity = '';
          } else if (state === 1) {
            inner.style.background = fg;
            inner.style.opacity = '1';
          } else {
            inner.style.background = fg;
            inner.style.opacity = '0.5';
          }
        }
      }

      const swatches = document.querySelectorAll('.state-legend .swatch');
      swatches[0].style.background = 'transparent';
      swatches[1].style.background = fg;
      swatches[2].style.background = fg;
      swatches[2].style.opacity = '0.5';

      const bg = colorBg.value;
      const fgR = parseInt(fg.slice(1, 3), 16);
      const fgG = parseInt(fg.slice(3, 5), 16);
      const fgB = parseInt(fg.slice(5, 7), 16);

      previewActualFrame.style.background = bg;
      previewScaledFrame.style.background = bg;

      const ctxA = previewActual.getContext('2d');
      ctxA.clearRect(0, 0, SIZE, SIZE);
      const ctxS = previewScaled.getContext('2d');
      ctxS.clearRect(0, 0, 100, 100);
      const scale = 20;

      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const s = grid[y][x];
          if (s === 0) continue;
          const alpha = s === 1 ? 1 : 0.5;
          const fill = `rgba(${fgR},${fgG},${fgB},${alpha})`;
          ctxA.fillStyle = fill;
          ctxA.fillRect(x, y, 1, 1);
          ctxS.fillStyle = fill;
          ctxS.fillRect(x * scale, y * scale, scale, scale);
        }
      }

      // Sync URL path
      let path = BASE + '/' + encodeGridData(grid);
      const fgHex = fg.slice(1);
      const bgHex = bg.slice(1);
      if (fgHex !== '000000' || bgHex !== 'ffffff')
        path += `,${fgHex},${bgHex}`;
      history.replaceState(null, '', path);
    }

    // --- Build grid cells ---
    const cells = [];
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.x = x;
        cell.dataset.y = y;

        const inner = document.createElement('div');
        inner.className = 'inner';
        cell.appendChild(inner);

        cell.addEventListener('click', () => {
          grid[y][x] = (grid[y][x] + 1) % 3;
          onChange();
        });

        cell.addEventListener('mouseenter', () => {
          coordsEl.textContent = `${x}, ${y}`;
        });

        gridEl.appendChild(cell);
        cells.push(cell);
      }
    }

    gridEl.addEventListener('mouseleave', () => {
      coordsEl.textContent = '—';
    });

    // --- Color inputs ---
    function bindColor(picker, hexInput) {
      picker.addEventListener('input', () => {
        hexInput.value = picker.value;
        onChange();
      });
      hexInput.addEventListener('input', () => {
        let v = hexInput.value.trim();
        if (!v.startsWith('#')) v = '#' + v;
        if (/^#[0-9a-fA-F]{6}$/.test(v)) {
          picker.value = v;
          onChange();
        }
      });
      hexInput.addEventListener('blur', () => {
        hexInput.value = picker.value;
      });
    }

    bindColor(colorFg, colorFgHex);
    bindColor(colorBg, colorBgHex);

    // --- Export SVG ---
    document.getElementById('btn-export').addEventListener('click', () => {
      const svg = generateSVGFromGrid(grid, colorFg.value, colorBg.value);
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (filenameInput.value.trim() || 'icon') + '.svg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('exported ' + a.download);
    });

    // --- Clear ---
    document.getElementById('btn-clear').addEventListener('click', () => {
      for (let y = 0; y < SIZE; y++)
        for (let x = 0; x < SIZE; x++)
          grid[y][x] = 0;
      onChange();
      showToast('grid cleared');
    });

    // --- Reset colors ---
    document.getElementById('btn-reset-colors').addEventListener('click', () => {
      colorFg.value = defaults.fg;
      colorBg.value = defaults.bg;
      colorFgHex.value = defaults.fg;
      colorBgHex.value = defaults.bg;
      onChange();
      showToast('colors reset');
    });

    // --- Toast ---
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastEl._timeout);
      toastEl._timeout = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    // --- Init ---
    onChange();
  }
</script>

</body>
</html>
